server {
    client_max_body_size 500M;
    listen 80;
    server_name api.localtest.me;

    location / {
        include /etc/nginx/denylist.d/*.conf;

        # Abuse protection: throttle bursts and cap concurrent connections.
        limit_req zone=api_per_ip burst=40 nodelay;
        limit_req_status 429;
        limit_conn api_conn_per_ip 20;

        # Hide backend CORS headers - let nginx handle CORS
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # CORS for all responses (including 4xx/5xx such as 429).
        # Known frontend origins get an exact origin + credentials=true (required for
        # withCredentials cookie flow). Unknown origins fall back to wildcard (no credentials).
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, OPTIONS, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;

        proxy_pass http://sanic:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        if ($request_method = 'OPTIONS') {
            # Explicitly set all CORS headers for OPTIONS requests
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, OPTIONS, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
    }

    gzip on;
    gzip_types text/css text/javascript text/xml text/plain text/x-component application/javascript application/x-javascript application/json application/xml application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}